<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>72nd ILA International Conference</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

/* NAVBAR */

.navbar{
    background:#F8BBD0;
    padding:15px 30px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-right:25px;
    font-weight:bold;
}

.navbar a:hover{
    color:#ffd700;
}

/* HERO SECTION */

.hero{
    height:700px;
    background:url('banner.png') center center/cover no-repeat;
    position:relative;
}

/* LOGOS */

.logo-container{
    position:absolute;
    top:20px;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
}

.ila-logo{
    height:70px;
    width:auto;
}

.uoh-logo{
    height:70px;
    width:auto;
}

/* HERO CONTENT */

.hero-content{
    position:absolute;
    top:180px;
    left:60px;
    color:black;
}

.hero-content h1{
    font-size:58px;
    color:#FF1493;
    margin-bottom:10px;
}

.hero-content h2{
    font-size:28px;
    margin-bottom:10px;
}

.hero-content h3{
    font-size:22px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Themes</a>
    <a href="#">Committee</a>
    <a href="#">Contact</a>
</nav>

<!-- HERO SECTION -->

<div class="hero">

    <div class="logo-container">

        <img src="ila.png.webp" alt="ILA Logo" class="ila-logo">

        <img src="uoh.jpg" alt="UoH Logo" class="uoh-logo">

    </div>

    <div class="hero-content">

        <h1>72nd ILA International Conference</h1>

        <h2>
            Future Libraries: Advancing Research & Excellence (FLARE-2027)
        </h2>

        <h3>
            7–9 January 2027 | University of Hyderabad
        </h3>

    </div>

</div>

</body>
</html>
